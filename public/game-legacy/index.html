<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blockworks</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #101721; color: #e6efe2; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; cursor: crosshair; }
    #top, #help { position: fixed; z-index: 2; pointer-events: none; text-shadow: 0 2px 0 #17202b; }
    #top { top: 18px; left: 20px; font-size: 12px; letter-spacing: .12em; }
    #top b { display: block; color: #d8ecbd; font-size: 15px; letter-spacing: .18em; margin-bottom: 5px; }
    #status { color: #9bc69b; font-size: 10px; }
    #help { right: 20px; bottom: 18px; text-align: right; color: #d1d6cb; font-size: 10px; line-height: 1.75; }
    #hotbar { position: fixed; z-index: 3; display: flex; gap: 5px; left: 50%; bottom: 22px; transform: translateX(-50%); }
    .slot { width: 58px; height: 52px; border: 2px solid #6c7c70; background: #15231d; display: grid; place-items: center; color: #e6efe2; font-size: 10px; cursor: pointer; }
    .slot.active { border-color: #e7e5ae; transform: translateY(-5px); background: #2b422f; }
    .swatch { width: 20px; height: 20px; border: 1px solid #e2e8d6; }
    .slot span { opacity: .7; }
    #start { position: fixed; inset: 0; z-index: 5; display: grid; place-items: center; background: radial-gradient(circle at 50% 30%, rgba(63,109,117,.75), rgba(9,14,20,.96) 70%); }
    #start section { width: min(460px, calc(100vw - 40px)); text-align: center; border: 1px solid #7fa77e; background: rgba(10,20,17,.86); padding: 34px; box-shadow: 0 20px 80px #000; }
    h1 { margin: 0 0 8px; font-size: clamp(34px,8vw,58px); letter-spacing: .12em; color: #e4f0cf; }
    p { color: #b3c0ad; font-size: 13px; line-height: 1.65; }
    button { font: inherit; color: #eff6db; border: 1px solid #b5d483; background: #294532; padding: 12px 20px; cursor: pointer; letter-spacing: .08em; }
    button:hover { background: #3b6343; }
    #toast { position: fixed; z-index: 4; top: 72px; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity .2s; background: #14231c; border: 1px solid #7fa77e; padding: 8px 12px; font-size: 11px; }
    @media (max-width: 620px) { #help { display: none; } .slot { width: 47px; height: 46px; } }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>
  <div id="top"><b>BLOCKWORKS</b><div id="status">SOLO WORLD</div></div>
  <div id="help">A / D or ← / → to move &nbsp;·&nbsp; W / SPACE to jump<br>click: mine &nbsp;·&nbsp; right click: place &nbsp;·&nbsp; 1–4: select block</div>
  <div id="hotbar"></div><div id="toast"></div>
  <div id="start"><section><h1>BLOCKWORKS</h1><p>A compact block sandbox made to run directly in the browser.<br>Mine terrain, place blocks, and invite friends through a LAN host.</p><button id="play">ENTER WORLD</button></section></div>
  <script>
  (() => {
    'use strict';
    const canvas = document.querySelector('#game'), ctx = canvas.getContext('2d');
    const status = document.querySelector('#status'), hotbar = document.querySelector('#hotbar'), toast = document.querySelector('#toast');
    const W = 96, H = 42, TILE = 24;
    const AIR=0, GRASS=1, DIRT=2, STONE=3, WOOD=4, LEAF=5;
    const palette = { [GRASS]: '#6da65d', [DIRT]: '#8b5a37', [STONE]: '#70818a', [WOOD]: '#a8733b', [LEAF]: '#3d794b' };
    const names = { [GRASS]: 'grass', [DIRT]: 'dirt', [STONE]: 'stone', [WOOD]: 'wood' };
    const selectable = [GRASS, DIRT, STONE, WOOD];
    const blocks = Array.from({length:H}, () => Array(W).fill(AIR));
    const edits = new Map(), keys = new Set(); let selected = 0, started = false, last = 0, network = null, myId = null;
    const remotes = new Map(); const player = { x: 38, y: 10, vx: 0, vy: 0, color: '#f1cf91' };
    let camera = 0, lastSent = 0, messageTimer;

    function noise(x) { const n = Math.sin(x * 12.9898) * 43758.5453; return n - Math.floor(n); }
    function surface(x) { return 24 + Math.floor(Math.sin(x*.15)*2 + Math.sin(x*.045)*4 + noise(x)*2); }
    function makeWorld() {
      for (let x=0; x<W; x++) {
        const ground = surface(x);
        for (let y=ground; y<H; y++) blocks[y][x] = y === ground ? GRASS : y < ground + 3 ? DIRT : STONE;
        if (x%13===4 && ground < H-7) { for(let y=ground-4;y<ground;y++) blocks[y][x]=WOOD; for(let xx=x-2;xx<=x+2;xx++) for(let yy=ground-7;yy<ground-3;yy++) if(Math.abs(xx-x)+Math.abs(yy-(ground-5))<4 && xx>=0 && xx<W) blocks[yy][xx]=LEAF; }
      }
      player.y = surface(Math.floor(player.x)) - 2;
    }
    function get(x,y) { return x < 0 || x >= W || y >= H ? STONE : y < 0 ? AIR : blocks[y][x]; }
    function set(x,y,value,share=true) {
      if (x<0 || x>=W || y<0 || y>=H) return;
      blocks[y][x]=value; edits.set(`${x},${y}`, value);
      if (share && network && network.readyState===WebSocket.OPEN) network.send(JSON.stringify({type:'block',x,y,z:0,block:value}));
    }
    function solidAt(x,y) { return get(Math.floor(x), Math.floor(y)) !== AIR; }
    function flash(text) { toast.textContent=text; toast.style.opacity=1; clearTimeout(messageTimer); messageTimer=setTimeout(()=>toast.style.opacity=0,1400); }
    function setupBar() {
      selectable.forEach((block,i) => { const el=document.createElement('button'); el.className='slot'; el.innerHTML=`<div class="swatch" style="background:${palette[block]}"></div><span>${i+1} ${names[block]}</span>`; el.onclick=()=>{selected=i; paintBar();}; hotbar.appendChild(el); }); paintBar();
    }
    function paintBar() { [...hotbar.children].forEach((el,i)=>el.classList.toggle('active', i===selected)); }
    function drawBlock(x,y,id,ox,oy) { const px=Math.round((x-camera)*TILE+ox), py=Math.round(y*TILE+oy); if (px<-TILE || px>canvas.width || py<-TILE || py>canvas.height) return; ctx.fillStyle=palette[id]; ctx.fillRect(px,py,TILE+1,TILE+1); if(id===GRASS){ctx.fillStyle='#9dce6f';ctx.fillRect(px,py,TILE,5);} if(id===STONE){ctx.fillStyle='#95a4a6';ctx.fillRect(px+4,py+5,3,3);ctx.fillRect(px+15,py+15,3,3);} if(id===DIRT){ctx.fillStyle='#aa7745';ctx.fillRect(px+5,py+6,2,2);ctx.fillRect(px+16,py+15,2,2);} if(id===WOOD){ctx.fillStyle='#d19a51';ctx.fillRect(px+4,py,4,TILE);}}
    function render() {
      const sky=ctx.createLinearGradient(0,0,0,canvas.height); sky.addColorStop(0,'#5e9db0'); sky.addColorStop(1,'#b9d4b4'); ctx.fillStyle=sky; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#dce9bd'; ctx.beginPath(); ctx.arc(760,92,32,0,Math.PI*2); ctx.fill();
      const ox=(canvas.width-(Math.min(40,W)*TILE))/2, oy=10; for(let y=0;y<H;y++) for(let x=Math.max(0,Math.floor(camera)-2);x<Math.min(W,Math.ceil(camera)+43);x++) if(get(x,y)) drawBlock(x,y,get(x,y),ox,oy);
      for (const remote of remotes.values()) drawPerson(remote.x, remote.y, remote.color || '#c19ae8', ox, oy, remote.id);
      drawPerson(player.x, player.y, player.color, ox, oy, 'YOU');
    }
    function drawPerson(x,y,color,ox,oy,label) { const px=(x-camera)*TILE+ox, py=y*TILE+oy; ctx.fillStyle='rgba(15,25,25,.25)';ctx.fillRect(px-9,py+34,21,4);ctx.fillStyle=color;ctx.fillRect(px-7,py+10,15,25);ctx.fillStyle='#f2c99b';ctx.fillRect(px-6,py,14,13);ctx.fillStyle='#202c37';ctx.fillRect(px-7,py+35,6,10);ctx.fillRect(px+2,py+35,6,10);ctx.fillStyle='#19272a';ctx.font='9px monospace';ctx.fillText(label,px-7,py-5); }
    function update(dt) {
      const left=keys.has('a')||keys.has('arrowleft'), right=keys.has('d')||keys.has('arrowright'); player.vx=(right?1:0)-(left?1:0); player.x += player.vx*dt*5; player.x=Math.max(.5,Math.min(W-.5,player.x));
      player.vy += 20*dt; let nextY=player.y+player.vy*dt;
      if(player.vy>=0 && (solidAt(player.x-.32,nextY+1.55)||solidAt(player.x+.32,nextY+1.55))) { nextY=Math.floor(nextY+1.55)-1.56; player.vy=0; }
      if(player.vy<0 && (solidAt(player.x-.3,nextY)||solidAt(player.x+.3,nextY))) { nextY=Math.floor(nextY)+.02; player.vy=0; } player.y=nextY;
      camera += ((player.x-20)-camera)*Math.min(1,dt*6); camera=Math.max(0,Math.min(W-40,camera));
      if(network && network.readyState===WebSocket.OPEN && performance.now()-lastSent>100) { network.send(JSON.stringify({type:'move',x:player.x,y:player.y,z:0,yaw:player.vx})); lastSent=performance.now(); }
    }
    function loop(t) { const dt=Math.min(.05,(t-last)/1000||0); last=t; if(started) update(dt); render(); requestAnimationFrame(loop); }
    function target(event) { const r=canvas.getBoundingClientRect(), ox=(canvas.width-(Math.min(40,W)*TILE))/2, x=Math.floor((event.clientX-r.left)*canvas.width/r.width-ox+camera*TILE)/TILE, y=Math.floor((event.clientY-r.top)*canvas.height/r.height-10)/TILE; return {x,y}; }
    function nearby(t) { return Math.hypot(t.x-(player.x),t.y-(player.y+1))<6; }
    canvas.addEventListener('mousedown', event => { if(!started) return; const t=target(event); if(!nearby(t)) return flash('too far away'); if(event.button===0 && get(t.x,t.y)!==AIR){set(t.x,t.y,AIR);flash('block mined');} if(event.button===2 && get(t.x,t.y)===AIR){set(t.x,t.y,selectable[selected]);flash('block placed');} }); canvas.addEventListener('contextmenu',event=>event.preventDefault());
    addEventListener('keydown',e=>{const k=e.key.toLowerCase(); keys.add(k); if([' ','arrowup'].includes(k)) { e.preventDefault(); if(Math.abs(player.vy)<.1) player.vy=-8; } const n=Number(k); if(n>=1&&n<=4){selected=n-1;paintBar();}}); addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
    function connect() { const server=new URLSearchParams(location.search).get('server'); if(!server) return; status.textContent='CONNECTING TO LAN…'; try { network=new WebSocket(server); } catch { status.textContent='LAN CONNECTION FAILED'; return; } network.onopen=()=>{status.textContent='LAN WORLD · CONNECTED';flash('LAN world connected');}; network.onerror=()=>status.textContent='LAN CONNECTION FAILED · SOLO MODE'; network.onclose=()=>status.textContent='LAN HOST OFFLINE · SOLO MODE'; network.onmessage=e=>{let m;try{m=JSON.parse(e.data)}catch{return} if(m.type==='welcome'){myId=m.id;(m.blocks||[]).forEach(b=>set(b.x,b.y,b.block,false));(m.players||[]).forEach(p=>{if(p.id!==myId)remotes.set(p.id,p);});} if(m.type==='player-join'||m.type==='player-move') {if(m.player.id!==myId)remotes.set(m.player.id,m.player);} if(m.type==='player-leave')remotes.delete(m.id);if(m.type==='block')set(m.x,m.y,m.block,false);}; }
    makeWorld(); setupBar(); connect(); document.querySelector('#play').onclick=()=>{started=true;document.querySelector('#start').style.display='none';flash('world loaded');}; requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
